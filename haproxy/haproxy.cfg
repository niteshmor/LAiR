global
    maxconn 1024
    # Log every transaction to stdout — `docker compose logs haproxy`.
    log stdout format raw local0 info

defaults
    mode http
    log global
    option httplog
    # Enhanced logging format: shows backend (tor-N), response time, bytes
    log-format "%ci:%cp [%tr] %ft %b/%s %TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq {%{+Q}r}"
    timeout connect 10s
    timeout client  120s
    timeout server  120s
    timeout http-request 10s
    timeout http-keep-alive 5s

frontend tor_http_in
    bind *:8118
    # Per-request routing by destination host. For HTTPS the host is the CONNECT
    # authority, for plain HTTP it's the Host header; both surface as hdr(host).
    # Strip any :port, lowercase, then look the domain up in the map that the
    # entrypoint builds from DIRECT_DOMAINS. A hit -> direct_pool (no Tor);
    # anything else falls through to the default tor_http_pool. map_dom matches a
    # domain and its subdomains, so "anthropic.com" also covers "api.anthropic.com".
    use_backend %[hdr(host),lower,regsub(:[0-9]+$,,),map_dom(/tmp/direct-domains.map,tor_http_pool)]
    default_backend tor_http_pool

# Direct-exit pool: domains in DIRECT_DOMAINS bypass Tor and go straight to the
# internet via the direct-proxy container (which is dual-homed on external_net).
backend direct_pool
    http-reuse never
    option http-server-close
    server direct-1  direct-proxy:8118  check

backend tor_http_pool
    balance roundrobin
    # Don't reuse backend connections — every individual request/CONNECT
    # gets balanced fresh across the pool. Without this, a client that
    # keeps its connection to haproxy alive would ride one tor-proxy
    # forever (haproxy in HTTP mode reuses a single backend conn per
    # client conn by default).
    http-reuse never
    option http-server-close
    server tor-1  tor-proxy-1:8118  check
    server tor-2  tor-proxy-2:8118  check
    server tor-3  tor-proxy-3:8118  check
