# tinyproxy as the direct-exit (no-Tor) forward proxy. Only reached for the
# domains in DIRECT_DOMAINS — haproxy routes those here and everything else to
# the Tor pool. Handles both plain HTTP and HTTPS (CONNECT) natively, so haproxy
# never has to forward-proxy itself.

# Listen on 8118 to match the Tor proxies' HTTP port, so haproxy treats every
# upstream proxy the same way.
Port 8118
Listen 0.0.0.0

# Log to stdout for `docker compose logs direct-proxy`.
LogLevel Info

# Who may use this proxy. The container sits on private_net + external_net; both
# are closed Docker bridges with no inbound path from the host or internet, so we
# allow the RFC-1918 ranges Docker assigns and deny everything else.
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# CONNECT (HTTPS tunnelling) is allowed to the standard TLS ports only.
ConnectPort 443
ConnectPort 563

# Don't advertise the proxy in forwarded headers.
DisableViaHeader Yes
